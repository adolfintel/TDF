# TDF - Main configuration file

###############################################################################
# GAME
# Settings that identify the game to run.
###############################################################################

# Path to the game executable (Windows-style path) inside the sandbox.
# Must be an absolute Windows path like 'C:\doom\doom2.exe'.
# If empty, a command prompt will be launched instead of a game.
# Default: "" (empty)
game_exe=''

# Working directory for the game (Windows-style path).
# If left empty, it defaults to the directory containing game_exe.
# Default: "" (empty, auto-detected from game_exe)
game_workingDir=''

# Arguments to pass to the game executable, one by one.
# Accepts a bash array or a string that will be parsed into arguments.
# Examples: ('-iwad' 'doom2.wad')  or  '-iwad doom2.wad'
# Default: () (empty array)
game_args=()

# Optional Steam App ID (numeric) for the game.
# Identifies a specific game on Steam, enabling game-specific workarounds
# in the wine-games build (e.g., known configuration tweaks, known fixes).
# Example: "1174180" for RDR2.
# Note: This does NOT require Steam to be installed; it's purely a lookup
# key for internal game-specific optimizations.
# Default: "" (empty)
# export SteamGameId=""

###############################################################################
# SANDBOXING / ISOLATION
# Controls how the Wine environment is sandboxed using bwrap.
###############################################################################

# Host filesystem exposure level.
#   0 = Do not expose the real filesystem at all (most secure).
#   1 = Expose the real filesystem as read-only H: drive.
#   2 = Expose the real filesystem as read-write H: drive.
#   Other values cause an error.
# Default: 1
# TDF_ALLOW_HOST_FILESYSTEM=1


# Custom mounts in the format "letter:access:hostPath" or "letter".
# - letter: single letter A-Z (except for 'C', which is reserved).
# - access: "ro" for read-only, "rw" for read-write (for host mounts),
#   or omitted (for local directory mounts, always read-write).
# - hostPath: absolute path on the host filesystem (~ is not allowed).
# - If hostPath is omitted, a directory named 'data/<letter>' is created
#   inside the TDF data folder and mounted.
# Examples: ("D:ro:$HOME/Desktop" "E:rw:/media/games" "F")
# Default: () (empty array)
# TDF_CUSTOM_MOUNTS=()


# Network access blocking method.
#   0 = Don't block network.
#   1 = Block with bwrap --unshare-net (default, no extra dependencies).
#   2 = Block with unshare -nc (separate network namespace).
# Default: 1
# TDF_BLOCK_NETWORK=1


# Block Wine from launching a system browser.
#   1 = Block browser launches (winebrowser.exe is disabled).
#   0 = Allow Wine to launch browsers (RUNS OUTSIDE THE SANDBOX!).
# Default: 1
# TDF_BLOCK_BROWSER=1


# Block access to /dev/shm (shared memory).
#   1 = Block /dev/shm access (recommended, stronger sandboxing).
#   0 = Don't block (weaker sandboxing, but some apps may need it).
# Default: 1
# TDF_BLOCK_SHM=1


# Block direct access to native input devices (/dev/input) for better security.
#   1 = Block direct access to keyboard, mouse, gamepad, etc.
#       (can break gamepad support)
#   0 = Allow access (default).
# Default: 0
# TDF_BLOCK_NATIVE_INPUT=0


###############################################################################
# WINE VERSION
# Which Wine build to use.
###############################################################################

# Preferred Wine version to use.
#   games     = Game-optimized Wine build (from system/wine-games/).
#               Recommended for gaming.
#   mainline  = Regular Wine mainline build (from system/wine-mainline/).
#   custom    = Custom Wine build (from ./wine-custom/ folder outside system/).
#   system    = System-installed Wine (from PATH). Falls back to mainline
#               if not found in PATH.
#   <anything else> = Tries to use ./wine-<value> folder, falls back to
#               system Wine if not found.
# Default: "games"
# TDF_WINE_PREFERRED_VERSION="games"


# Wine architecture for the prefix.
#   win64   = 64-bit Wine prefix (recommended).
#   wow64   = 32-on-64 prefix.
#   win32   = 32-bit prefix (same as wow64).
# Default: "win64"
# TDF_WINE_ARCH="win64"


# Use Wine Mono (for .NET application support).
#   1 = Install Wine Mono MSI (needed for .NET games/apps).
#   0 = Don't install, use Wine's built-in .NET stubs.
# Default: 0
# TDF_WINEMONO=0


# Use Wine Gecko (for Internet Explorer / WebView support).
#   1 = Install Wine Gecko MSI (32-bit and 64-bit).
#   0 = Don't install, use Wine's built-in Gecko stubs.
# Default: 0
# TDF_WINEGECKO=0


# Install official Microsoft Visual C++ Redistributables (2015+).
#   1 = Install x86 and x64 VC++ redistributables (default).
#   0 = Use Wine's built-in implementations.
# Default: 1
# TDF_VCREDIST=1


# Wine DLL override string.
# Controls which DLLs Wine loads natively vs. from the system.
# Format: a semicolon-separated list of "dll=[n,b|b,n|n|b|d]" entries.
#   (n=native, b=builtin, d=disable)
# Example: "winemenubuilder.exe=d;ole32=n"
# Common values:
#   "dinput8,version,winmm=n,b" = Load dinput8.dll, version.dll and winmm.dll
#                                 from the game folder
# first, common for mods.
# Note: This is managed internally during sandbox init. Only set this if you
#       know what you're doing, as it may break Wine functionality.
# Default: "" (empty)
# export WINEDLLOVERRIDES=""


# Wine debug output string.
# Controls Wine's debug logging categories and levels.
# Format: comma-separated list of "category[=level]" entries.
# Common values:
#   "-all"          = Disable all debug output (default).
#    ""             = Enable default Wine logging
#   "-all,+loaddll" = Log DLL loading.
# Note: Setting this to something other than "-all" may significantly
#       impact performance. Use for debugging only.
# Default: "-all" (no debug output)
# export WINEDEBUG="-all"


# DRI prime offloading GPU selector.
# Useful on systems with hybrid graphics (e.g., Intel iGPU + NVIDIA/AMD dGPU).
#   0 = Use the integrated GPU (default).
#   1 = Use the discrete GPU via DRI prime offloading.
#   2+ = Alternative GPU devices (less common).
# This is set as an environment variable in the sandbox. Useful for forcing
# games to use a specific GPU on hybrid systems.
# Default: whatever your OS decides
# export DRI_PRIME=0

# Hide Wine "stopped working" crash dialogs.
#   1 = If the game crashes, Wine quits silently without showing a dialog.
#   0 = Show the standard Wine crash dialog.
# Default: 1
# TDF_WINE_HIDE_CRASHES=1


# Audio driver for Wine.
#   pulse   = PulseAudio.
#   alsa    = ALSA.
#   jack    = JACK.
#   default = Let Wine decide (usually the best choice).
# Default: "default"
# TDF_WINE_AUDIO_DRIVER="default"


# Graphics driver for Wine (X11 vs Wayland).
#   x11     = Force X11.
#   wayland = Force Wayland (also auto-enabled when TDF_HDR=1).
#   default = Let Wine decide.
#   auto    = Auto-detect: uses Wayland if WAYLAND_DISPLAY is set,
#             X11 if DISPLAY is set, otherwise default.
# Note: When TDF_HDR=1, this is forced to "wayland".
# Default: "default"
# TDF_WINE_GRAPHICS_DRIVER="default"


# Install basic Windows fonts.
#   1 = Install fonts.
#   0 = Rely on Wine's built-in font substitutions.
# Default: 1
# TDF_COREFONTS=1


# Windows version to emulate.
# Sensible values: win10, win11, win7, win8, win81, vista, winxp, winxp64.
# Other values: win2003, win2008, win2008r2, winme, win2k, win98,
#               win95, nt40, nt351, win31, win30, win20.
# Leave empty to let Wine decide (currently defaults to win10).
# Can also be changed later via winecfg.
# Default: "" (empty, let Wine decide)
# TDF_WINE_WINVER=""


# Wine theme to apply (a .reg file from system/themes/).
# Leave empty to let Wine decide (or change via winecfg).
# Default: "" (empty, no theme applied)
# TDF_WINE_THEME=""


# Wine language/locale.
# Set to a locale string like "it_IT.UTF-8" or "en_US.UTF-8".
# Leave empty for Wine default.
# Default: "" (empty)
# TDF_WINE_LANGUAGE=""


# Maximum number of logical CPUs (hardware threads) the application can use.
# If the machine has more CPUs than this value, TDF will limit and
# intelligently assign cores to maximize gaming performance.
# Set to 0 to disable any CPU limit.
# Only supported by the "games" Wine build.
# Default: 0 (disabled)
# TDF_WINE_MAXLOGICALCPUS=0


# Hide SMT/Hyper-Threading from the application.
#   1 = Only physical cores are shown to Wine (SMT threads are hidden).
#       Only supported by the "games" Wine build.
#   0 = Show all logical CPUs (including SMT threads).
# Default: 0
# TDF_WINE_NOSMT=0


# Hide performance cores (E-cores) from the application on Intel hybrid CPUs.
#   1 = Only performance cores are shown to Wine.
#       Only supported by the "games" Wine build.
#   0 = Show all cores (P-cores and E-cores).
# Default: 0
# TDF_WINE_NOECORES=0


# CPU core assignment preference.
#   0 = Let Wine decide
#   1 = Assign based on speed, but prefer all cores on the first CPU
#       before using others. Useful for single-socket systems.
#   2 = Only show the first CPU/NUMA socket to the application.
#       Useful for multi-CPU servers.
#       Only supported by the "games" Wine build.
# Default: 0
# TDF_WINE_PREFER_SAMESOCKET=0


# DPI scaling for Wine.
#  -1 = Use the system DPI (auto-detected via xrdb).
#   0 = Let Wine decide.
#  N  = Use specified DPI value (e.g., 120, 144, 192).
# Default: 0 (let Wine decide)
# TDF_WINE_DPI=0


# Wine synchronization backend.
#   ""    = Let Wine decide (ntsync if available, falls back to fsync/esync).
#   fsync = Force futex-based fsync (not recommended).
#   esync = Force Wine esync (not recommended).
# Default: "" (let Wine decide, prefer ntsync)
# TDF_WINE_SYNC=""


# Enable Large Address Aware (LAA) support for 32-bit applications.
# Allows 32-bit Wine apps to address more than 2GB of memory.
#   1 = Enable LAA.
#   0 = Disable.
# Default: 1
# TDF_WINE_LAA=1


# Enable heap delay-free optimization.
# Delays freeing heap memory for better compatibility with games with
# use-after-free bugs and less overhead from system calls.
#   1 = Enable.
#   0 = Disable.
# Default: 1
# TDF_WINE_HEAP_DELAY_FREE=1


# Wine smoke test before running the game.
#   1 = Run a smoke test to verify Wine is working correctly.
#   0 = Skip the smoke test.
# Default: 1
# TDF_WINE_SMOKETEST=1


# Wine debug relay: log all Windows system calls for debugging (VERY SLOW!).
#   1 = Prompt for a save path and enable relay.
#   0 = Don't enable relay logging.
# Default: 0
# TDF_WINE_DEBUG_RELAY=0


# Debug GStreamer (to debug issues with audio/video playback).
#   1 = Enable GStreamer debug logging (GST_DEBUG=4,WINE:9).
#   0 = Don't debug GStreamer.
# Default: 0
# TDF_WINE_DEBUG_GSTREAMER=0


###############################################################################
# DIRECTX / GRAPHICS API TRANSLATION LAYERS
# DXVK, VKD3D-Proton, and D7VK settings.
###############################################################################

# Enable DXVK (Direct3D 8/9/10/11 and DXGI implementation based on Vulkan).
#   1 = Install and enable DXVK DLLs.
#   0 = Don't install, use WineD3D.
# Note: If VKD3D or D7VK is enabled, DXVK is auto-enabled as a dependency.
# Default: 1
# TDF_DXVK=1


# Enable dxvk-nvapi (Nvidia API layer for DXVK).
# Provides NVAPI support and some performance optimizations.
#   1 = Install and enable dxvk-nvapi.
#   0 = Don't install.
# Note: Requires DXVK.
# Default: 1
# TDF_DXVK_NVAPI=1


# Enable VKD3D-Proton (Direct3D 12 to Vulkan translation).
#   1 = Install and enable VKD3D-Proton DLLs.
#   0 = Don't install, use Wine's VKD3D implementation.
# Note: Requires DXVK.
# Default: 1
# TDF_VKD3D=1


# Enable D7VK (DirectX 3-7 to Vulkan translation).
#   1 = Install and enable D7VK DLLs.
#   0 = Don't install, use WineD3D
# Note: Requires DXVK.
# Default: 1
# TDF_D7VK=1


# HDR support.
#   0 = HDR disabled.
#   1 = Expose HDR support to the application.
#       Must be supported and enabled in the OS, requires Wayland.
# Default: 0
# TDF_HDR=0


# OpenGL frame rate limiter via libstrangle.
#   0 = Unlimited FPS.
#   N = Limit to N frames per second.
# Default: 0 (unlimited)
# TDF_GL_MAXFPS=0


# Enable AMD FSR4 on supported GPUs
#   0 = Don't enable
#   1 = Enable FSR4 (will install a proprietary AMD DLL into the sandbox)
# Default: 0
# export FSR4_UPGRADE=0


###############################################################################
# CALLBACKS
# Optional shell functions that are called at specific points during execution.
# Note: these callbacks run inside a subshell outside the sandbox; therefore
# they cannot:
#    * Run wine commands (they would launch system wine outside the sandbox)
#    * Change any of the settings in this file
#    * They have full access to the host system, incl. file system and network
#      (the sandbox is in $PWD/data)
#
#                   !!! NEVER CALL WINE FROM THESE SCRIPTS !!!
#
###############################################################################

# onGameStart - called right before the game starts running.
# Runs in a subshell in the sandbox context.
# This is useful for custom setup tasks like:
#   - Applying custom patches or mods
#   - Setting up environment variables
#   - Running pre-launch scripts
# Example:
#   function onGameStart() {
#       echo "Pre-launch: copying mods..."
#       cp -r mods/* "data/wineprefix/drive_c/Game/"
#   }
# Default: not defined (no action)
# function onGameStart() { }


# onGameEnd - called immediately after the game stops running.
# Runs in a subshell in the sandbox context.
# The game exit code is NOT available here (use onArchiveEnd for that).
# This is useful for:
#   - Cleaning up temporary files
#   - Backing up saved games
#   - Running post-launch cleanup
# Example:
#   function onGameEnd() {
#       echo "Post-game: cleaning up temp files..."
#       rm -f "data/home/wine/.cache/*"
#   }
# Default: not defined (no action)
# function onGameEnd() { }


# whileGameRunning - called while the game is actively running.
# Runs in a background subshell. It is automatically killed when the game exits.
# This function can run indefinitely or perform periodic tasks.
# Common use cases:
#   - Monitoring game performance or health
#   - Running a watchdog that restarts the game on crash
#   - Displaying a custom progress indicator
# Example:
#   function whileGameRunning() {
#       while true; do
#           echo "Game is running..."
#           sleep 30
#       done
#   }
# Default: not defined (no action)
# function whileGameRunning() { }


# customChecks - called during game selection/configuration loading.
# If this function returns a non-zero exit code, the entire script exits.
# This is useful for:
#   - Validating prerequisites (e.g., checking if required files exist)
#   - Checking available disk space or memory
#   - Running compatibility checks before launch
#   - Prompting the user with custom dialogs to confirm or cancel
# Example:
#   function customChecks() {
#       local saves="data/wineprefix/drive_c/MyGame/saves"
#       if [ -d "$saves" ]; then
#           local backupDir="data/backups"
#           mkdir -p "$backupDir"
#           local timestamp=$(date +%Y%m%d_%H%M%S)
#           tar czf "$backupDir/saves_${timestamp}.tar.gz" -C "$saves" .
#           echo "Saves backed up to $backupDir/saves_${timestamp}.tar.gz"
#       fi
#       return 0
#   }
# Default: not defined (no action)
# function customChecks() { return 0; }


# onArchiveStart - called before the archive/export process begins.
# Runs in a subshell with the same arguments passed to run.sh (archive mode).
# Arguments available: $1 = archive path, $2+ = options (-f, -m, -p, -s, -o).
# If this function returns a non-zero exit code, the archive process is aborted.
# This is useful for:
#   - Preparing the game for archiving (e.g., uninstalling mods)
#   - Running pre-archive checks
#   - Creating additional files to include in the archive
# The code for the archive process is in system/archive.sh.
# Example:
#   function onArchiveStart() {
#       echo "Preparing game data for archiving..."
#       # Uninstall any runtime-generated content
#   }
# Default: not defined (no action)
# function onArchiveStart() { return 0; }


# onArchiveEnd - called after the archive/export process completes.
# Runs in a subshell with one argument: $1 = archive exit code (0 = success, non-zero = error).
# The code for the archive process is in system/archive.sh.
# This is useful for:
#   - Post-archive cleanup (e.g., removing temporary files created by onArchiveStart)
#   - Reporting success/failure to the user
#   - Uploading the archive to a remote location
# Example:
#   function onArchiveEnd() {
#       local res=$1
#       if [ $res -eq 0 ]; then
#           echo "Archive created successfully."
#       else
#           echo "Archive failed with exit code $res."
#       fi
#       # Clean up any files created by onArchiveStart
#   }
# Default: not defined (no action)
# function onArchiveEnd() { }


###############################################################################
# DESKTOP INTEGRATION
# Desktop notifications and session management.
###############################################################################

# Enable Do Not Disturb mode while the game is running.
# Works on supported desktop environments (GNOME, KDE, etc.).
#   1 = Enable DND.
#   0 = Don't enable DND.
# Default: 1
# TDF_DND=1


# Inhibit system sleep while the game is running.
# Works on supported desktop environments (GNOME, KDE, etc.).
#   1 = Inhibit sleep.
#   0 = Don't inhibit sleep.
# Default: 1
# TDF_NOSLEEP=1


###############################################################################
# OVERLAY / BENCHMARKING TOOLS
# MangoHud and Gamescope settings.
###############################################################################

# Enable MangoHud overlay.
#   1 = Use MangoHud for FPS/performance overlay.
#       Requires mangohud to be installed on the system.
#   0 = Don't use MangoHud.
# Note: If enabled alongside Gamescope, MangoHud is disabled and
#       Gamescope's built-in mangoapp is used instead.
# Default: 0
# TDF_MANGOHUD=0


# Enable Gamescope compositor/layering tool.
#   1 = Use Gamescope for framing, resolution scaling, and HDR.
#       Requires gamescope to be installed on the system.
#   0 = Don't use Gamescope.
# Default: 0
# TDF_GAMESCOPE=0


# Gamescope parameters (string or array).
# If empty, defaults to: -f -r 60 -w <XRES> -h <YRES>
# Parameters are not validated; pass whatever Gamescope accepts.
# Examples: "-f -r 120 -w 1920 -h 1080" or (-f -r 120 -w 1920 -h 1080)
# Default: "" (empty)
# TDF_GAMESCOPE_PARAMETERS=''


###############################################################################
# ADDITIONAL SETTINGS
# General settings and miscellaneous options.
###############################################################################

# Custom title for dialogs.
# Override the default translated title used in all dialogs
# Leave empty to use the default localized title ("Launcher").
# Example: "Ultimate Doom"
# Default: "" (empty, uses localized default title)
# TDF_TITLE=""


# UI language override.
# Leave empty to use the system default or the locale loaded by main.sh.
# Default: "" (empty)
# TDF_UI_LANGUAGE=''


# Hide the "game running" dialog shown while the game is active.
#   1 = Hide the dialog (runs in background).
#   0 = Show a Zenity info dialog with a "Force Stop" button.
# Default: 0
# TDF_HIDE_GAME_RUNNING_DIALOG=0


# Ignore file existence checks for the game executable.
#   1 = Skip checking if game_exe exists before launching.
#   0 = Check that the executable exists in the sandbox before launching.
# Default: 0
# TDF_IGNORE_EXIST_CHECKS=0
