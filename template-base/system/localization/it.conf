TDF_LOCALE_ARCHIVE_SYNTAX='Sintassi: ./run.sh archive [opzioni]\nLe opzioni sono:\n* -o <path>: percorso del file di output (default: ../dirName.tar.zst, dove dirName è il nome di questa cartella)\n* -m <zstd|xz|gzip|tar>: metodo di compressione, tar è non compresso. Non richiesto se l'\''estensione è specificata in -o\n* -p <max|normal|fast>: preset di compressione\n* -f: sovrascrivi il file di output se esiste già\n* -s <size>: divide il file di output in parti della dimensione specificata. Valori validi sono auto oppure un numero seguito da M o G, ad esempio 100M o 1G\n\nSintassi breve: ./run.sh archive [comandocorto]\nI comandi corti sono:\n* maxcompress: zstd max con percorso di output di default\n* fastcompress: xz fast con percorso di output di default\n* nocompress: tar non compresso con percorso di output di default\n* se il comandocorto è omesso, viene usato maxcompress'
